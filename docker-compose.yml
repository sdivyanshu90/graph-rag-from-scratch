services:
  neo4j:
    image: neo4j:5.22
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password12345}"
    volumes:
      - neo4j_data:/data

  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      ENABLE_NEO4J_SYNC: "true"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-password12345}"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - neo4j
    command:
      [
        "uvicorn",
        "graph_rag.api:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]

volumes:
  neo4j_data:
